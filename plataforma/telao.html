<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TELÃO | Hackathon Inova+ 2026</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/base.css"/>
  
  <style>
    body { 
        background: #04060a; 
        color: var(--text); 
        font-family: 'Syne', sans-serif; 
        overflow: hidden; 
        margin: 0;
        height: 100vh;
        display: flex;
        flex-direction: column;
        transition: box-shadow 0.2s ease-out;
    }
    
    body::before {
        content: ""; position: absolute; inset: 0; pointer-events: none; z-index: 0;
        background-image: 
            radial-gradient(circle at 50% 50%, rgba(0, 240, 255, 0.05) 0%, transparent 60%),
            linear-gradient(rgba(0, 240, 255, 0.03) 1px, transparent 1px),
            linear-gradient(90deg, rgba(0, 240, 255, 0.03) 1px, transparent 1px);
        background-size: 100% 100%, 60px 60px, 60px 60px;
    }

    .t-header {
        position: relative; z-index: 10;
        display: flex; justify-content: space-between; align-items: center;
        padding: 30px 50px;
        border-bottom: 1px solid rgba(0, 240, 255, 0.2);
        background: rgba(4, 6, 10, 0.8);
    }
    .t-logo-text { font-family: 'Bebas Neue', sans-serif; font-size: 3rem; color: var(--cyan); letter-spacing: 4px; text-shadow: 0 0 20px rgba(0, 240, 255, 0.5); line-height: 1; }
    .t-logo-sub { font-family: 'Space Mono', monospace; font-size: 1rem; color: var(--muted); letter-spacing: 3px; }
    
    .t-main {
        flex: 1; position: relative; z-index: 10;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    .t-sprint-badge {
        font-family: 'Space Mono', monospace; font-size: 1.8rem; color: var(--yellow);
        border: 2px solid var(--yellow); padding: 10px 30px; border-radius: 8px;
        letter-spacing: 4px; margin-bottom: 20px;
        box-shadow: 0 0 30px rgba(255, 214, 0, 0.2);
        background: rgba(255, 214, 0, 0.05);
    }
    .t-timer {
        font-family: 'Bebas Neue', sans-serif; 
        font-size: 25vw; 
        line-height: 0.85;
        color: var(--cyan);
        text-shadow: 0 0 50px rgba(0, 240, 255, 0.6);
        letter-spacing: 10px;
        margin: 0;
    }
    .t-timer.paused {
        color: var(--muted);
        text-shadow: 0 0 30px rgba(255, 255, 255, 0.1);
    }
    .t-timer.danger {
        color: #ff4444;
        text-shadow: 0 0 50px rgba(255, 68, 68, 0.6);
        animation: pulse-danger 1s infinite;
    }

    @keyframes pulse-danger {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.85; transform: scale(0.98); }
    }

    .t-progress-container {
        width: 80%; height: 12px; background: rgba(255, 255, 255, 0.05);
        border-radius: 10px; margin-top: 40px; overflow: hidden;
        border: 1px solid rgba(0, 240, 255, 0.2);
    }
    .t-progress-fill {
        height: 100%; background: var(--cyan);
        box-shadow: 0 0 20px var(--cyan);
        transition: width 1s linear;
        width: 100%;
    }

    /* RODAPÉ DO TELÃO */
    .t-footer {
        position: relative; z-index: 10;
        height: 120px;
        background: var(--purple);
        border-top: 4px solid #fff;
        display: flex; align-items: center;
    }
    .t-mural-label {
        background: #fff; color: var(--purple);
        font-family: 'Bebas Neue', sans-serif; font-size: 3rem;
        padding: 0 40px; height: 100%;
        display: flex; align-items: center; justify-content: center;
        z-index: 20; box-shadow: 10px 0 30px rgba(0,0,0,0.5);
    }
    .t-ticker-wrap {
        flex: 1; padding: 0 40px; display: flex; align-items: center; overflow: hidden;
    }
    
    #telao-ticker {
        font-family: 'Space Mono', monospace; 
        font-size: 2.2rem; 
        color: #fff; 
        font-weight: 700; 
        text-shadow: 0 0 10px rgba(255,255,255,0.3);
        white-space: nowrap;
    }

    /* POPUP GIGANTE (NOVO) */
    #telao-popup {
        display: none; 
        opacity: 0; 
        transform: scale(0.8); 
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
        position: absolute; 
        inset: 0; 
        z-index: 999; 
        background: rgba(4, 6, 10, 0.95); 
        backdrop-filter: blur(15px); 
        flex-direction: column; 
        align-items: center; 
        justify-content: center; 
        padding: 50px; 
        text-align: center;
    }
    .popup-label { font-family:'Space Mono', monospace; font-size:2rem; color:var(--purple); letter-spacing:8px; margin-bottom:20px; }
    #popup-author { font-family:'Bebas Neue', sans-serif; font-size:5rem; color:var(--yellow); margin-bottom:30px; letter-spacing:4px; text-shadow: 0 0 40px rgba(255, 214, 0, 0.4); }
    #popup-text { font-family:'Syne', sans-serif; font-size:3.5rem; color:#fff; line-height:1.3; max-width:85%; font-weight: 700; }
  </style>
</head>
<body>

  <div id="telao-popup">
      <div class="popup-label">// MENSAGEM DA COORDENAÇÃO //</div>
      <h2 id="popup-author">🤖 JOTA</h2>
      <p id="popup-text">Atenção equipes!</p>
  </div>

  <header class="t-header">
    <div>
      <div class="t-logo-text">INOVA+ 2026</div>
      <div class="t-logo-sub">SENAI JOINVILLE &middot; INDÚSTRIA 5.0</div>
    </div>
    <div style="font-family: 'Space Mono', monospace; font-size: 2.5rem; color: var(--muted);" id="clock-live">--:--</div>
  </header>

  <main class="t-main">
    <div class="t-sprint-badge" id="telao-sprint-name">// AGUARDANDO INÍCIO //</div>
    <h1 class="t-timer paused" id="telao-timer">--:--</h1>
    <div class="t-progress-container">
      <div class="t-progress-fill" id="telao-progress"></div>
    </div>
  </main>

  <footer class="t-footer">
    <div class="t-mural-label">📢 MURAL JOTA</div>
    <div class="t-ticker-wrap">
      <div id="telao-ticker">
        <span style="color:rgba(255,255,255,0.5)">Aguardando instruções da coordenação...</span>
      </div>
    </div>
  </footer>

<script type="module" src="../assets/js/app.js"></script>
<script>
  const sprintNames = ['Empatia Humana', 'Co-Piloto IA', 'Toque Humano 5.0', 'Ponte Digital', 'Pitch Final'];
  
  // Relógio do Sistema (Hora atual)
  setInterval(() => {
      const now = new Date();
      document.getElementById('clock-live').textContent = 
          String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
  }, 1000);

  // Semáforo do Cronômetro Mestre
  setInterval(() => {
    if (!window.SprintTimer) return; 
    
    const state = window.SprintTimer.getState();
    const rem = window.SprintTimer.getRemaining();
    const timerEl = document.getElementById('telao-timer');
    const progressEl = document.getElementById('telao-progress');
    
    timerEl.textContent = window.fmtTime(rem);
    
    // Atualiza os Textos de Status
    if (state.running) {
        document.getElementById('telao-sprint-name').textContent = `// SPRINT ${state.sprint} — ${sprintNames[state.sprint-1].toUpperCase()} //`;
    } else {
        if (rem === 0) {
            document.getElementById('telao-sprint-name').textContent = `// SPRINT ${state.sprint} ENCERRADO //`;
        } else if (state.sprint >= 1) {
            document.getElementById('telao-sprint-name').textContent = `// SPRINT ${state.sprint} (PAUSADO) //`;
        } else {
            document.getElementById('telao-sprint-name').textContent = `// PREPARAÇÃO //`;
        }
    }

    if (rem === 0) {
        timerEl.className = 't-timer danger';
    } else if (!state.running) {
        timerEl.className = 't-timer paused';
    } else if (rem <= 300 && rem > 0) { 
        timerEl.className = 't-timer danger';
    } else {
        timerEl.className = 't-timer';
    }

    // Lógica da Barra de Progresso
    const SPRINT_TIMES = window.SprintTimer.sprintTimes || [900, 900, 900, 1800, 900];
    const sprintMaxTime = SPRINT_TIMES[state.sprint - 1] || 900; 
    
    let pct = (rem / sprintMaxTime) * 100;
    if (pct > 100) pct = 100;
    if (pct < 0) pct = 0;
    progressEl.style.width = pct + '%';
    
    if (rem <= 300) { 
        progressEl.style.background = '#ff4444';
        progressEl.style.boxShadow = '0 0 20px #ff4444';
    } else {
        progressEl.style.background = 'var(--cyan)';
        progressEl.style.boxShadow = '0 0 20px var(--cyan)';
    }

  }, 500);

  // 📢 OUVINTE DO MURAL DO JOTA PARA O TELÃO (USANDO O POPUP GIGANTE E O TICKER)
  let isTelaoReady = false;
  setTimeout(() => { isTelaoReady = true; }, 2000); // Evita popup fantasma ao carregar a página

  const checkLoadFirebase = setInterval(() => {
      if (window.InovaDB && window.InovaDB.db) {
          clearInterval(checkLoadFirebase);
          
          window.InovaDB.onValue(
            window.InovaDB.ref(window.InovaDB.db, 'controle/mensagemJota'),
            (snapshot) => {
              const msgData = snapshot.val();
              
              if (msgData && msgData.texto && msgData.timestamp) {
                  // Puxa a última mensagem lida da memória
                  const msgLida = sessionStorage.getItem('jota_msg_telao_lida');
                  
                  // Se for uma mensagem nova
                  if (msgData.timestamp.toString() !== msgLida) {
                      
                      // 1. Grava como lida
                      sessionStorage.setItem('jota_msg_telao_lida', msgData.timestamp.toString());
                      
                      // 2. Atualiza o Ticker (Rodapé Deslizante)
                      const ticker = document.getElementById('telao-ticker');
                      if (ticker) {
                          const horaFormatada = new Date(msgData.timestamp).toLocaleTimeString('pt-BR').slice(0,5);
                          ticker.innerHTML = `<span style="color:var(--yellow)">[${horaFormatada}] JOTA:</span> ${msgData.texto}`;
                      }

                      // 3. Exibe o Alerta Gigante no Centro da Tela
                      if (isTelaoReady) {
                          // Efeito de piscar a tela inteira em roxo
                          document.body.style.boxShadow = "inset 0 0 150px var(--purple)";
                          setTimeout(() => { document.body.style.boxShadow = "none"; }, 1000);
                          
                          const popup = document.getElementById('telao-popup');
                          document.getElementById('popup-text').innerHTML = msgData.texto;
                          
                          popup.style.display = 'flex';
                          // Pequeno delay para a animação do CSS pegar
                          setTimeout(() => { 
                              popup.style.opacity = '1'; 
                              popup.style.transform = 'scale(1)'; 
                          }, 50);
                          
                          // Esconde o popup gigante automaticamente após 15 segundos
                          setTimeout(() => {
                              popup.style.opacity = '0';
                              popup.style.transform = 'scale(0.8)';
                              setTimeout(() => { popup.style.display = 'none'; }, 400); // Aguarda o fade out
                          }, 15000);
                      }
                  }
              }
            }
          );
      }
  }, 100);
</script>
</body>
</html>
