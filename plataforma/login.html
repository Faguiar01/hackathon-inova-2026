<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login | Hackathon Inova+ 2026</title>
  <link rel="stylesheet" href="../assets/css/base.css"/>
  <style>
    body{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
    .login-wrap{width:100%;max-width:440px;position:relative;z-index:2}
    .login-header{text-align:center;margin-bottom:36px}
    .login-logo{font-family:'Bebas Neue', sans-serif;font-size:1.8rem;font-weight:900;color:var(--cyan);letter-spacing:4px;text-shadow:0 0 10px rgba(0,240,255,0.4);display:block;margin-bottom:6px}
    .login-sub{font-family:'Space Mono', monospace;font-size:.62rem;color:var(--text);letter-spacing:3px}
    .login-box{background:rgba(8,12,18,.95);border:1px solid var(--border);padding:36px;border-radius:8px;}
    .role-selector{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:28px}
    .role-btn{padding:14px 8px;background:transparent;border:1px solid var(--border);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:6px;transition:all .2s; border-radius:4px;}
    .role-btn .r-icon{font-size:1.4rem}
    .role-btn .r-label{font-family:'Bebas Neue', sans-serif;font-size:.8rem;letter-spacing:1px;color:var(--text);transition:color .2s}
    .role-btn.active[data-role=participante]{border-color:var(--cyan);background:rgba(0,229,255,.08)}
    .role-btn.active[data-role=participante] .r-label{color:var(--cyan)}
    .role-btn.active[data-role=monitor]{border-color:var(--yellow);background:rgba(255,214,0,.08)}
    .role-btn.active[data-role=monitor] .r-label{color:var(--yellow)}
    .role-btn.active[data-role=adm]{border-color:var(--purple);background:rgba(213,0,249,.08)}
    .role-btn.active[data-role=adm] .r-label{color:var(--purple)}
    .role-btn:hover{border-color:rgba(0,229,255,.3)}
    .login-form{display:grid;gap:16px}
    .field label { display:block; font-family:'Space Mono', monospace; font-size:.6rem; color:var(--cyan); margin-bottom:6px; letter-spacing:1px; }
    .field input { width:100%; padding:12px; background:rgba(255,255,255,.04); border:1px solid rgba(0,240,255,.2); color:var(--text); font-family:'Syne', sans-serif; font-size:.9rem; border-radius:4px; transition:.2s; }
    .field input:focus { outline:none; border-color:var(--yellow); }
    .login-divider{display:flex;align-items:center;gap:12px;margin:4px 0}
    .login-divider span{font-family:'Space Mono', monospace;font-size:.58rem;color:var(--text);letter-spacing:2px;white-space:nowrap}
    .login-divider::before,.login-divider::after{content:'';flex:1;height:1px;background:var(--border)}
    .back-link{display:block;text-align:center;margin-top:20px;font-family:'Space Mono', monospace;font-size:.65rem;color:var(--text);text-decoration:none;letter-spacing:1px;transition:color .2s}
    .back-link:hover{color:var(--cyan)}
    .btn-login {background:var(--cyan); color:var(--dark); font-family:'Bebas Neue', sans-serif; font-size:1.2rem; padding:15px; border:none; border-radius:4px; cursor:pointer; letter-spacing:2px; transition:all 0.2s; width:100%; margin-top:4px;}
    .btn-login:disabled { opacity: 0.5; cursor: not-allowed; }
    .error-msg{background:rgba(255,23,68,.08);border:1px solid #ff4444;padding:10px 14px;font-family:'Space Mono', monospace;font-size:.7rem;color:#ff4444;letter-spacing:1px;display:none; border-radius:4px;}
    .error-msg.show{display:block}
  </style>
</head>
<body>

<div class="login-wrap z1">
  <div class="login-header">
    <span class="login-logo">INOVA+</span>
    <span class="login-sub">SENAI JOINVILLE · PLATAFORMA</span>
  </div>

  <div class="login-box">
    <div class="role-selector">
      <button class="role-btn" data-role="participante">
        <span class="r-icon">🎯</span>
        <span class="r-label">PARTICIPANTE</span>
      </button>
      <button class="role-btn" data-role="monitor">
        <span class="r-icon">📋</span>
        <span class="r-label">MONITOR</span>
      </button>
      <button class="role-btn" data-role="adm">
        <span class="r-icon">🖥️</span>
        <span class="r-label">ADMIN</span>
      </button>
    </div>

    <div class="login-divider"><span>// CREDENCIAIS DE ACESSO</span></div>

    <form class="login-form" id="login-form" novalidate>
      <div class="field">
        <label>Perfil Selecionado</label>
        <input type="text" id="role-display" readonly placeholder="← Selecione seu perfil acima" style="cursor:default;color:var(--cyan);"/>
      </div>
      
      <div class="field" id="field-equipe" style="display:none;">
        <label>Nome da Equipe</label>
        <input type="text" id="teamName" placeholder="Digite o nome exato da equipe cadastrada"/>
      </div>
      
      <div class="field">
        <label>Senha de Acesso</label>
        <input type="password" id="password" placeholder="Digite sua senha" autocomplete="current-password"/>
      </div>
      
      <div class="error-msg" id="error-msg">⛔ Dados incorretos. Verifique e tente novamente.</div>
      
      <button type="submit" class="btn-login" id="login-btn" disabled>
        ENTRAR NA PLATAFORMA →
      </button>
    </form>
  </div>

  <a href="../index.html" class="back-link">← Voltar ao site público</a>
</div>

<script src="../assets/js/app.js"></script>
<script>
  let selectedRole = null;

  document.querySelectorAll('.role-btn').forEach(btn => {
    btn.addEventListener('click', () => selectRole(btn.dataset.role));
  });

  function selectRole(role) {
    selectedRole = role;
    document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
    const btn = document.querySelector(`.role-btn[data-role="${role}"]`);
    if (btn) btn.classList.add('active');
    
    const labels = { participante: 'PARTICIPANTE', monitor: 'MONITOR', adm: 'COORDENAÇÃO ADM' };
    document.getElementById('role-display').value = labels[role] || role;
    
    // Mostra o campo Nome da Equipe apenas se for Participante
    document.getElementById('field-equipe').style.display = (role === 'participante') ? 'block' : 'none';
    
    document.getElementById('login-btn').disabled = false;
    document.getElementById('error-msg').classList.remove('show');
    
    if(role === 'participante') {
        document.getElementById('teamName').focus();
    } else {
        document.getElementById('password').focus();
    }
  }

  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    if (!selectedRole) { toast('Selecione seu perfil primeiro!', 'error'); return; }
    
    const pw = document.getElementById('password').value;
    const team = document.getElementById('teamName').value;
    
    if (selectedRole === 'participante' && !team) {
      toast('Digite o nome da equipe!', 'warning');
      return;
    }

    const btn = document.getElementById('login-btn');
    btn.textContent = 'VERIFICANDO NO BANCO...'; 
    btn.disabled = true;

    // Aguarda a resposta do Firebase configurada no app.js
    const isLogged = await window.AUTH.login(selectedRole, pw, team);
    
    if (isLogged) {
      btn.textContent = '✓ ACESSO CONCEDIDO';
      setTimeout(() => {
        window.location.href = window.AUTH.redirects[selectedRole];
      }, 500);
    } else {
      document.getElementById('error-msg').classList.add('show');
      btn.textContent = 'ENTRAR NA PLATAFORMA →';
      btn.disabled = false;
      document.getElementById('password').value = '';
      if(selectedRole === 'participante') document.getElementById('teamName').focus();
      else document.getElementById('password').focus();
    }
  });
</script>
</body>
</html>
