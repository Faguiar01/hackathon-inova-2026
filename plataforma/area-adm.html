<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Centro de Comando | Inova+ 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/base.css"/>
  <style>
    body { background: var(--dark); color: var(--text); font-family: 'Syne', sans-serif; }
    
    .topbar{position:fixed;top:0;left:0;right:0;z-index:400;display:flex;align-items:center;gap:16px;padding:12px 28px;background:rgba(7,9,15,.97);border-bottom:1px solid rgba(213,0,249,.2);backdrop-filter:blur(8px)}
    .tb-logo{font-family:'Bebas Neue', sans-serif;font-size:1.4rem;color:var(--purple);letter-spacing:2px;text-shadow:0 0 20px rgba(213,0,249,.3)}
    .tb-role{font-family:'Space Mono', monospace;font-size:.62rem;letter-spacing:2px;padding:4px 10px;border:1px solid rgba(213,0,249,.3);color:var(--purple); border-radius:4px;}
    
    .main{padding:100px 28px 48px;max-width:1400px;margin:0 auto;position:relative;z-index:1}
    
    .master-timer-card{background:var(--panel);border:1px solid rgba(213,0,249,.3);padding:32px;margin-bottom:35px;display:grid;grid-template-columns:1fr auto;gap:32px;align-items:center; border-radius:12px; box-shadow: 0 10px 30px rgba(0,0,0,0.3);}
    .mt-display{text-align:center}
    .mt-time{font-family:'Bebas Neue', sans-serif;font-size:5rem;color:var(--purple);text-shadow:0 0 30px rgba(213,0,249,.4);letter-spacing:8px; line-height:1;}
    .mt-sprint{font-family:'Space Mono', monospace; font-size:0.75rem; color:var(--muted); margin-top:15px; letter-spacing:2px;}

    .adm-tabs{display:flex;gap:30px;margin-bottom:30px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom:5px;}
    .adm-tab{padding:10px 5px; background:transparent; border:none; color:var(--muted); font-family:'Bebas Neue'; font-size:1.3rem; letter-spacing:1px; cursor:pointer; transition:0.3s; position:relative;}
    .adm-tab.active { color: var(--purple); }
    .adm-tab.active::after { content:''; position:absolute; bottom:-7px; left:0; width:100%; height:3px; background:var(--purple); box-shadow: 0 0 15px var(--purple); }

    .dash-grid-top { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
    .kpi-card { background: var(--panel); border: 1px solid var(--border); padding: 25px; border-radius: 12px; border-left: 4px solid var(--purple); }
    .kpi-val { font-family: 'Bebas Neue'; font-size: 3rem; color: #fff; line-height: 1; margin-bottom: 5px; display:block; }
    .kpi-lbl { font-family: 'Space Mono'; font-size: 0.65rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }

    .table-container { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 30px;}
    table { width: 100%; border-collapse: collapse; text-align: left; }
    th { padding: 18px 20px; background: rgba(255,255,255,0.02); font-family: 'Space Mono', monospace; font-size: 0.7rem; color: var(--purple); text-transform: uppercase; letter-spacing: 2px; border-bottom: 1px solid var(--border); }
    td { padding: 16px 20px; border-bottom: 1px solid rgba(255,255,255,0.03); font-size: 0.95rem; vertical-align: middle; }
    
    .adm-score-input { width: 60px; background: rgba(0,0,0,0.4); border: 1px solid #333; color: #fff; text-align: center; padding: 10px; border-radius: 6px; font-family: 'Space Mono'; outline: none; }
    .adm-score-input:focus { border-color: var(--purple); }
    
    .textarea-terminal { width: 100%; height: 180px; background: rgba(0,0,0,0.3); border: 1px solid var(--border); color: var(--cyan); font-family: 'Space Mono'; padding: 20px; border-radius: 8px; outline: none; }

    .btn { padding: 14px 24px; font-family: 'Bebas Neue'; border-radius: 6px; cursor: pointer; border: none; transition: 0.2s; font-size: 1.1rem; letter-spacing: 1px; }
    .btn-green { background: #00C851; color: #000; }
    .btn-purple { background: var(--purple); color: #fff; }
    .btn-danger { background: #ff4444; color: #fff; font-size: 0.8rem; padding: 8px 15px; }

    .status-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--muted); display: inline-block; margin-right: 8px; }
    .status-dot.active { background: #00C851; box-shadow: 0 0 10px #00C851; }
  </style>
</head>
<body>

<header class="topbar">
  <span class="tb-logo">INOVA+ 2026</span>
  <span class="tb-role">COORDENAÇÃO MESTRE</span>
  <button onclick="window.AUTH.logout()" style="margin-left:auto; background:none; border:1px solid #333; color:var(--muted); padding:6px 18px; border-radius:4px; font-size:0.7rem; cursor:pointer;">SAIR</button>
</header>

<main class="main">

  <div class="master-timer-card">
    <div class="mt-display">
      <span class="mt-time" id="master-time">--:--</span>
      <div id="master-sprint-label" class="mt-sprint">// AGUARDANDO START //</div>
    </div>
    
    <div style="display:grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap:12px;">
  <button class="btn btn-purple" onclick="liberarEquipes()">🚪 LIBERAR EQUIPES</button>
  <button class="btn" style="background:#555; color:#fff;" onclick="fecharLobby()">🔒 FECHAR LOBBY</button>
  <button class="btn btn-green" id="btn-start" onclick="masterStart()">▶ INICIAR</button>
  <button class="btn" style="background:#ffbb33; color:#000; border:none; font-family:'Bebas Neue'; font-size:1.1rem; border-radius:6px; cursor:pointer;" onclick="masterPause()">⏸ PAUSAR</button>
</div>
      
      <div style="display:flex; gap:8px;">
        <select id="select-sprint-jump" onchange="pularParaSprint(this.value)" style="flex:1; background:var(--purple); border:1px solid #d500f9; color:#fff; padding:12px; border-radius:6px; font-family:'Bebas Neue'; font-size:1.2rem; letter-spacing:1px; outline:none; cursor:pointer; text-align:center;">
          <option value="" disabled selected>⚡ PULAR PARA OUTRA FASE...</option>
          <option value="1">Ir para SPRINT 1: Empatia</option>
          <option value="2">Ir para SPRINT 2: Co-Piloto IA</option>
          <option value="3">Ir para SPRINT 3: Toque Humano</option>
          <option value="4">Ir para SPRINT 4: Ponte Digital</option>
          <option value="5">Ir para SPRINT 5: Pitch Final</option>
        </select>
      </div>

      <button class="btn btn-danger" onclick="masterReset()">↺ ZERAR TEMPO DA FASE ATUAL</button>
    </div>
  </div>

  <nav class="adm-tabs">
    <button class="adm-tab active" data-tab="dashboard">📊 DASHBOARD LIVE</button>
    <button class="adm-tab" data-tab="engajamento">🏆 RANKING & NOTAS</button>
    <button class="adm-tab" data-tab="equipes">👥 GERENCIAR EQUIPES</button>
    <button class="adm-tab" data-tab="mural">📢 MURAL JOTA</button>
  </nav>

  <div id="tab-dashboard" class="tab-content">
    <div class="dash-grid-top">
      <div class="kpi-card"><span class="kpi-lbl">Equipes</span><span class="kpi-val" id="kpi-teams">0</span></div>
      <div class="kpi-card" style="border-color:var(--cyan)"><span class="kpi-lbl">Social Total</span><span class="kpi-val" id="kpi-eng" style="color:var(--cyan)">0</span></div>
      <div class="kpi-card" style="border-color:var(--yellow)"><span class="kpi-lbl">Sprint Atual</span><span class="kpi-val" id="kpi-phase" style="color:var(--yellow)">1</span></div>
      <div class="kpi-card" style="border-color:#00C851"><span class="kpi-lbl">Status DB</span><span class="kpi-val" style="color:#00C851">ONLINE</span></div>
    </div>
    <div class="table-container" style="padding: 20px;">
      <div style="font-family:'Bebas Neue'; color:var(--purple); margin-bottom:20px;">ENTREGAS DE RENDER (CHECK)</div>
      <div id="dash-team-status" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px;"></div>
    </div>
  </div>

  <div id="tab-engajamento" class="tab-content" style="display:none">
    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th style="width: 80px;">POS</th>
            <th>EQUIPE</th>
            <th style="text-align:center;">REDES (LIKE/COMM)</th>
            <th style="text-align:center; color:var(--cyan)">MONITOR</th>
            <th style="text-align:center; color:var(--yellow)">CLIENTE (X2)</th>
            <th style="text-align:center;">TOTAL GERAL</th>
          </tr>
        </thead>
        <tbody id="eng-tbody"></tbody>
      </table>
    </div>
  </div>

  <div id="tab-equipes" class="tab-content" style="display:none">
    <div class="table-container">
      <table>
        <thead>
          <tr><th># ID</th><th>NOME DO SQUAD</th><th>MESA</th><th>INTEGRANTES</th></tr>
        </thead>
        <tbody id="teams-tbody"></tbody>
      </table>
    </div>
  </div>

  <div id="tab-mural" class="tab-content" style="display:none">
    <div class="table-container" style="padding: 30px;">
      <textarea id="mural-msg" class="textarea-terminal" placeholder="Mensagem para o telão..."></textarea>
      <button class="btn btn-purple" onclick="postMural()" style="width:100%; margin-top:20px;">🚀 PUBLICAR NO SISTEMA</button>
    </div>
  </div>

</main>

<script type="module" src="../assets/js/app.js"></script>
<script>
  const checkLoad = setInterval(() => {
      if (window.AUTH && window.SprintTimer && window.InovaDB) {
          clearInterval(checkLoad);
          iniciarPainelADM();
      }
  }, 100);

  let teams = [];
  const sprintNames = ['Empatia Humana','Co-Piloto IA','Toque Humano 5.0','Ponte Digital','Pitch Final'];

  function iniciarPainelADM() {
      window.AUTH.require('adm');
      setInterval(() => {
          updateMasterDisplay();
          updateDashboardKPIs();
      }, 1000);
      carregarDados();
  }

  function carregarDados() {
      window.InovaDB.onValue(window.InovaDB.ref(window.InovaDB.db, 'equipes'), (snapshot) => {
          const data = snapshot.val();
          teams = data ? Object.keys(data).map(id => ({ id, ...data[id] })) : [];
          renderTudo();
      });
  }

  function renderTudo() {
      const sorted = [...teams].sort((a,b) => calcularTotal(b) - calcularTotal(a));

      document.getElementById('eng-tbody').innerHTML = sorted.map((t, i) => {
          const n = t.notasEquipe || {};
          const mon = (parseFloat(n.c1)||0) + (parseFloat(n.c2)||0) + (parseFloat(n.c3)||0) + (parseFloat(n.c4)||0);
          const cli = (parseFloat(n.nota_cliente)||0) * 2;
          return `<tr>
            <td style="font-family:'Bebas Neue'; font-size:1.5rem; color:var(--muted)">${i+1}º</td>
            <td style="font-weight:700; color:#fff">${t.nomeEquipe.toUpperCase()}</td>
            <td style="text-align:center">
                <input type="number" class="adm-score-input" value="${t.eng_likes||0}" onchange="updateSocial('${t.id}','eng_likes',this.value)">
                <input type="number" class="adm-score-input" value="${t.eng_comments||0}" onchange="updateSocial('${t.id}','eng_comments',this.value)">
            </td>
            <td style="text-align:center; color:var(--cyan)">${mon.toFixed(1)}</td>
            <td style="text-align:center; color:var(--yellow)">${cli.toFixed(1)}</td>
            <td style="text-align:center; font-family:'Bebas Neue'; font-size:1.8rem;">${calcularTotal(t).toFixed(1)}</td>
          </tr>`;
      }).join('');

      document.getElementById('teams-tbody').innerHTML = teams.map((t,i) => `
        <tr><td>${i+1}</td><td style="font-weight:bold">${t.nomeEquipe}</td><td>MESA ${t.mesa||'--'}</td><td>${t.membros||'--'}</td></tr>
      `).join('');

      document.getElementById('dash-team-status').innerHTML = teams.map(t => `
        <div style="background:rgba(255,255,255,0.02); padding:12px; border-radius:8px; border:1px solid rgba(255,255,255,0.05); display:flex; align-items:center;">
            <span class="status-dot ${t.renderEnviado ? 'active' : ''}"></span>
            <span style="font-size:0.8rem; font-weight:600;">${t.nomeEquipe}</span>
        </div>
      `).join('');
  }

  function updateDashboardKPIs() {
      if(teams.length === 0) return;
      const totalEng = teams.reduce((acc, t) => acc + (parseInt(t.eng_likes)||0) + (parseInt(t.eng_comments)||0)*5, 0);
      document.getElementById('kpi-teams').textContent = teams.length;
      document.getElementById('kpi-eng').textContent = totalEng;
      document.getElementById('kpi-phase').textContent = window.SprintTimer.getState().sprint;
  }

  function updateMasterDisplay() {
      if (!window.SprintTimer || !window.SprintTimer.getState) return;
      const state = window.SprintTimer.getState();
      const nomeDaFase = sprintNames[state.sprint-1] ? sprintNames[state.sprint-1].toUpperCase() : '';
      document.getElementById('master-time').textContent = window.fmtTime(window.SprintTimer.getRemaining());
      if (state.running) {
          document.getElementById('master-sprint-label').textContent = `// SPRINT ${state.sprint} — ${nomeDaFase} //`;
      } else {
          document.getElementById('master-sprint-label').textContent = `// SPRINT ${state.sprint} — ${nomeDaFase} (PAUSADO) //`;
      }
  }

  window.updateSocial = (id, field, val) => {
      const u = {}; u[`equipes/${id}/${field}`] = parseInt(val)||0;
      window.InovaDB.update(window.InovaDB.ref(window.InovaDB.db), u);
  };

  function calcularTotal(t) {
      const soc = (parseInt(t.eng_likes)||0) + (parseInt(t.eng_comments)||0)*5 + (parseInt(t.eng_shares)||0)*3;
      const n = t.notasEquipe || {};
      const mon = (parseFloat(n.c1)||0) + (parseFloat(n.c2)||0) + (parseFloat(n.c3)||0) + (parseFloat(n.c4)||0);
      const cli = (parseFloat(n.nota_cliente)||0) * 2;
      return soc + mon + cli;
  }

  document.querySelectorAll('.adm-tab').forEach(tab => {
      tab.addEventListener('click', () => {
          document.querySelectorAll('.adm-tab').forEach(t => t.classList.remove('active'));
          tab.classList.add('active');
          const target = tab.dataset.tab;
          document.querySelectorAll('.tab-content').forEach(content => {
              content.style.display = content.id === 'tab-' + target ? 'block' : 'none';
          });
      });
  });

  window.masterStart = () => window.SprintTimer.start();
window.masterPause = () => window.SprintTimer.pause();
window.masterReset = () => confirm('Zerar cronômetro desta fase?') && window.SprintTimer.reset();

window.liberarEquipes = () => {
  if (confirm('Liberar todas as equipes do lobby para a roleta?')) {
    const updates = {};
    updates['controle/liberarEquipes'] = true;

    const btn = document.querySelector('button[onclick="liberarEquipes()"]');
    if (btn) {
      btn.disabled = true;
      btn.textContent = '✅ EQUIPES LIBERADAS';
      btn.style.opacity = '0.8';
    }

    window.InovaDB.update(window.InovaDB.ref(window.InovaDB.db), updates)
      .then(() => {
        window.toast('Equipes liberadas com sucesso!', 'success');
      })
      .catch((err) => {
        console.error(err);
        window.toast('Erro ao liberar equipes.', 'error');

        if (btn) {
          btn.disabled = false;
          btn.textContent = '🚪 LIBERAR EQUIPES';
          btn.style.opacity = '1';
        }
      });
  }
};
window.fecharLobby = () => {
  const updates = {};
  updates['controle/liberarEquipes'] = false;

  window.InovaDB.update(window.InovaDB.ref(window.InovaDB.db), updates)
    .then(() => {
      window.toast('Lobby fechado com sucesso!', 'success');

      const btn = document.querySelector('button[onclick="liberarEquipes()"]');
      if (btn) {
        btn.disabled = false;
        btn.textContent = '🚪 LIBERAR EQUIPES';
        btn.style.opacity = '1';
      }
    })
    .catch((err) => {
      console.error(err);
      window.toast('Erro ao fechar lobby.', 'error');
    });
};

 // 🚀 MUDANÇA DE FASE USANDO A FUNÇÃO NATIVA DO APP.JS
  window.pularParaSprint = (val) => {
      const selectEl = document.getElementById('select-sprint-jump');
      if (!val) return;

      const novoSprint = parseInt(val);
      if (confirm(`ATENÇÃO COORDENAÇÃO: Mudar o evento inteiro para o SPRINT ${novoSprint}?`)) {
          
          // 1. Chama a função oficial e segura que já existe no seu app.js
          if (window.SprintTimer && typeof window.SprintTimer.setSprint === 'function') {
              window.SprintTimer.setSprint(novoSprint);
              window.toast(`Mudando para Sprint ${novoSprint}...`, 'success');
              
              // 2. Truque Visual: Atualiza a tela na hora para não confundir o operador 
              // enquanto o Firebase faz a sincronização pelo app.js
              const nome = sprintNames[novoSprint-1].toUpperCase();
              document.getElementById('master-sprint-label').textContent = `// SPRINT ${novoSprint} — ${nome} (SINCRONIZANDO...) //`;
              
              const kpiPhase = document.getElementById('kpi-phase');
              if (kpiPhase) kpiPhase.textContent = novoSprint;
              
          } else {
              alert("Erro: Função setSprint não encontrada no sistema.");
          }
      }
      
      selectEl.value = ""; // Reseta o menu de volta para o texto "⚡ PULAR PARA OUTRA FASE..."
  };

  window.postMural = () => {
      const msg = document.getElementById('mural-msg').value;
      if(!msg) return;
      window.Mural.pushFirebase(window.Mural.dbRef, { author: '🤖 JOTA', text: msg, time: new Date().toLocaleTimeString().slice(0,5) });
      document.getElementById('mural-msg').value = '';
      window.toast('NOTIFICAÇÃO ENVIADA!');
  };
</script>
</body>
</html>
