<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Avaliação Especialista | Inova+ 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;700&family=Space+Mono&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/base.css"/>
  <style>
   body { background: var(--dark); color: var(--text); font-family: 'Syne', sans-serif; padding: 20px; padding-bottom: 140px; display: block !important; width: 100% !important; margin: 0; }
    .header-especialista { text-align: center; margin-bottom: 30px; border-bottom: 1px solid var(--yellow); padding-bottom: 15px; position: relative; }
    .btn-sair-sessao { position: absolute; top: 50%; transform: translateY(-50%); right: 20px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2); color: var(--muted); padding: 8px 20px; border-radius: 6px; font-family: 'Space Mono'; font-size: 0.8rem; cursor: pointer; transition: 0.2s; }
    .btn-sair-sessao:hover { background: rgba(255,255,255,0.1); color: #fff; }
    .container-grid { max-width: 1400px; width: 100%; margin: 0 auto; }
    
    /* FILTROS NO JURADO */
    .filtros-jurado { display: flex; gap: 20px; background: rgba(255,255,255,0.02); padding: 20px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 30px; flex-wrap: wrap; }
    .filtro-item { flex: 1; min-width: 200px; }
    .filtro-lbl { font-family: 'Space Mono'; font-size: 0.7rem; display: block; margin-bottom: 8px; letter-spacing: 1px; }
    .filtro-select { width: 100%; background: rgba(0,0,0,0.5); color: #fff; padding: 12px; border-radius: 6px; font-family: 'Bebas Neue'; font-size: 1.3rem; outline: none; cursor: pointer; letter-spacing: 1px; transition: 0.2s; }
    
    .teams-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
    .team-card { background: rgba(8, 12, 18, 0.8); border: 1px solid rgba(255, 214, 0, 0.2); padding: 25px; border-radius: 16px; display: flex; flex-direction: column; justify-content: space-between; text-align: left; transition: transform 0.3s, box-shadow 0.3s; position: relative; overflow: hidden; }
    .team-card::before { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: var(--yellow); opacity: 0.5; transition: 0.3s; }
    .team-card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(255,214,0,0.15); border-color: var(--yellow); }
    .team-card:hover::before { opacity: 1; }
    .card-header { border-bottom: 1px solid rgba(255, 255, 255, 0.1); padding-bottom: 15px; margin-bottom: 20px; }
    .team-vertente { font-family: 'Space Mono', monospace; font-size: 0.7rem; color: var(--cyan); text-transform: uppercase; letter-spacing: 2px; display: block; margin-bottom: 5px; }
    .team-name { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; color: #fff; margin: 0; letter-spacing: 1.5px; }
    
    /* TAGS VISUAIS */
    .badge-info { font-family: 'Space Mono', monospace; font-size: 0.65rem; padding: 3px 6px; border-radius: 4px; font-weight: bold; vertical-align: middle; display: inline-block; margin-left: 6px; }
    .badge-manha { background: rgba(255,214,0,0.1); border: 1px solid rgba(255,214,0,0.3); color: var(--yellow); }
    .badge-tarde { background: rgba(255,31,142,0.1); border: 1px solid rgba(255,31,142,0.3); color: #ff1f8e; }
    .badge-presencial { background: rgba(0,240,255,0.1); border: 1px solid rgba(0,240,255,0.3); color: var(--cyan); }
    .badge-online { background: rgba(0,200,81,0.1); border: 1px solid rgba(0,200,81,0.3); color: #00C851; }

    .card-body { display: flex; flex-direction: column; gap: 20px; flex-grow: 1; }
    .btn-render { display: block; text-align: center; padding: 12px; border-radius: 8px; font-family: 'Bebas Neue'; font-size: 1.2rem; letter-spacing: 1px; text-decoration: none; transition: 0.2s; }
    .btn-render.ready { background: rgba(0, 240, 255, 0.1); color: var(--cyan); border: 1px solid var(--cyan); }
    .btn-render.ready:hover { background: var(--cyan); color: var(--dark); }
    .btn-render.waiting { background: rgba(255, 255, 255, 0.03); color: rgba(255, 255, 255, 0.4); border: 1px dashed rgba(255, 255, 255, 0.2); cursor: not-allowed; }
    .nota-wrapper { display: flex; align-items: center; justify-content: space-between; background: rgba(0, 0, 0, 0.5); padding: 15px; border-radius: 8px; border: 1px solid rgba(255, 255, 255, 0.05); }
    .nota-label { font-family: 'Space Mono', monospace; font-size: 0.8rem; color: var(--muted); }
    .note-input { width: 80px; height: 50px; font-size: 1.8rem; text-align: center; background: transparent; border: 2px solid rgba(255, 214, 0, 0.3); color: var(--yellow); font-family: 'Bebas Neue'; border-radius: 6px; outline: none; transition: 0.2s; }
    .note-input:focus { border-color: var(--yellow); background: rgba(255, 214, 0, 0.05); }
    .note-input::placeholder { color: rgba(255, 214, 0, 0.2); }
    .footer-actions { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(7, 9, 15, 0.95); padding: 20px; border-top: 1px solid rgba(255, 214, 0, 0.3); backdrop-filter: blur(10px); display: flex; justify-content: center; z-index: 100; }
    .btn-finalizar { background: var(--yellow); color: #000; border: none; padding: 15px 50px; font-family: 'Bebas Neue'; font-size: 1.5rem; letter-spacing: 2px; cursor: pointer; border-radius: 8px; box-shadow: 0 0 20px rgba(255, 214, 0, 0.2); transition: 0.3s; display: flex; align-items: center; gap: 10px; }
    .btn-finalizar:hover { transform: translateY(-2px); box-shadow: 0 0 30px rgba(255, 214, 0, 0.4); background: #fff; }
    
    @media (max-width: 768px) { .header-especialista { display: flex; flex-direction: column; padding-top: 10px; gap: 15px; border-bottom: none; } .header-especialista h1 { font-size: 2.2rem; line-height: 1; } .btn-sair-sessao { position: relative; top: 0; transform: none; right: 0; width: 100%; padding: 12px; } .teams-grid { grid-template-columns: 1fr; } .team-card { padding: 20px; } .btn-finalizar { width: 100%; justify-content: center; font-size: 1.3rem; padding: 15px 20px; } body { padding-bottom: 100px; } .filtros-jurado { flex-direction: column; gap: 15px; } }
  </style>
</head>
<body>

<div class="header-especialista">
  <div style="font-family:'Space Mono'; font-size:0.7rem; color:var(--yellow); letter-spacing:3px; margin-bottom:5px;">PAINEL DE AVALIAÇÃO DE MERCADO</div>
  <h1 style="font-family:'Bebas Neue'; font-size:3rem; color:#fff; margin:0; letter-spacing: 2px;">JURADO ESPECIALISTA</h1>
  <p id="client-name-display" style="color:var(--cyan); font-size:1rem; margin-top:10px; font-family: 'Space Mono', monospace;"></p>
  <button class="btn-sair-sessao" onclick="window.AUTH.logout()">SAIR DA SESSÃO</button>
</div>

<div class="container-grid">
    <div class="filtros-jurado">
        <div class="filtro-item">
            <span class="filtro-lbl" style="color: var(--cyan);">QUAL A MODALIDADE?</span>
            <select id="filtro-mod-jurado" class="filtro-select" style="border: 1px solid var(--cyan);" onchange="render()">
                <option value="todos">🌍 MOSTRAR TODAS</option>
                <option value="presencial">🏢 PRESENCIAL</option>
                <option value="online">🌐 ONLINE</option>
            </select>
        </div>
        <div class="filtro-item">
            <span class="filtro-lbl" style="color: var(--yellow);">QUAL O TURNO?</span>
            <select id="filtro-turno-jurado" class="filtro-select" style="border: 1px solid var(--yellow);" onchange="render()">
                <option value="todos">🌍 MOSTRAR TODOS</option>
                <option value="manha">☀️ MANHÃ</option>
                <option value="tarde">🌙 TARDE</option>
            </select>
        </div>
    </div>

    <div class="teams-grid" id="teams-grid">
        <div style="text-align:center; color:var(--cyan); font-family:'Space Mono'; grid-column: 1 / -1; padding: 100px; font-size: 1.2rem; border: 1px dashed var(--cyan); border-radius: 12px; background: rgba(0,240,255,0.02);">
            <div style="font-size: 2rem; margin-bottom: 15px;">⏳</div>
            Sincronizando Squads com o Servidor...
        </div>
    </div>
</div>

<div class="footer-actions">
    <button class="btn-finalizar" id="btn-submit-all" onclick="window.confirmarEnvioGeral()">
        <span>✓</span> SALVAR NOTAS DA TELA
    </button>
</div>

<script type="module" src="../assets/js/app.js"></script>
<script>
  const checkLoad = setInterval(() => { if (window.AUTH && window.InovaDB) { clearInterval(checkLoad); iniciarCliente(); } }, 100);
  let teams = [];
  
  function iniciarCliente() {
      window.AUTH.require('cliente');
      let nome = sessionStorage.getItem('inova_nome_cliente');
      if (!nome) {
          nome = prompt("BEM-VINDO JURADO! Por favor, identifique-se (Nome e Empresa):");
          if (!nome || nome.trim().length < 2) { window.AUTH.logout(); return; }
          sessionStorage.setItem('inova_nome_cliente', nome.trim());
      }
      document.getElementById('client-name-display').textContent = `AVALIADOR: ${nome.toUpperCase()}`;
      carregarDados();
  }

  function carregarDados() {
      window.InovaDB.onValue(window.InovaDB.ref(window.InovaDB.db, 'equipes'), (snapshot) => {
          const data = snapshot.val();
          teams = data ? Object.keys(data).map(id => ({ id, ...data[id] })) : [];
          teams.sort((a,b) => a.nomeEquipe.localeCompare(b.nomeEquipe));
          render();
      });
  }

  function render() {
      const grid = document.getElementById('teams-grid');
      const filtroMod = document.getElementById('filtro-mod-jurado').value;
      const filtroTurno = document.getElementById('filtro-turno-jurado').value;

      // Filtra a lista de equipes com base nas seleções do Jurado
      let equipesFiltradas = teams.filter(t => {
          let passaMod = true;
          let passaTurno = true;

          if (filtroMod !== 'todos') {
              const modEq = t.modalidade ? t.modalidade.toLowerCase() : '';
              passaMod = (modEq === filtroMod);
          }
          if (filtroTurno !== 'todos') {
              const turnoEq = t.turno ? t.turno.toLowerCase() : 'manha'; // Assiste manhã se vazio
              passaTurno = (turnoEq === filtroTurno);
          }

          return passaMod && passaTurno;
      });

      if(equipesFiltradas.length === 0) { 
          grid.innerHTML = `<div style="text-align:center; color:#ff4444; font-family:'Space Mono'; grid-column: 1 / -1; padding: 100px; border: 1px dashed #ff4444; border-radius: 12px; background: rgba(255,68,68,0.02);">Nenhum Squad encontrado com os filtros selecionados.</div>`; 
          return; 
      }

      grid.innerHTML = equipesFiltradas.map(t => {
          const n = t.notasEquipe || {};
          const notaSalva = n.nota_cliente !== undefined ? n.nota_cliente : "";
          let btnRender = ''; let badgeAprovacao = '';

          let finalLink = n.renderLink;
          if (finalLink) {
              const driveRegex = /drive\.google\.com\/file\/d\/([-_a-zA-Z0-9]+)/;
              const match = finalLink.match(driveRegex);
              if (match && match[1]) { finalLink = `https://drive.google.com/file/d/${match[1]}/preview`; }
          }

          if (n.renderEnviado && n.renderLink) {
              btnRender = `<a href="${finalLink}" target="_blank" class="btn-render ready">👁️ ABRIR PROJETO 3D</a>`;
              if (n.renderAprovado === true) { badgeAprovacao = `<div style="font-family:'Space Mono'; font-size: 0.65rem; color: #00C851; text-align: center; margin-top: -10px; margin-bottom: 10px;">✅ APROVADO PELO MONITOR</div>`; } 
              else if (n.renderAprovado === false) { badgeAprovacao = `<div style="font-family:'Space Mono'; font-size: 0.65rem; color: #ff4444; text-align: center; margin-top: -10px; margin-bottom: 10px;">⚠️ IMAGEM REJEITADA PELO MONITOR</div>`; }
          } else { btnRender = `<div class="btn-render waiting">⏳ PROJETO NÃO ENVIADO</div>`; }

          // TAGS DE IDENTIFICAÇÃO NA TELA DO JURADO
          const turnoBadge = t.turno === 'tarde' ? '<span class="badge-info badge-tarde">🌙 TARDE</span>' : '<span class="badge-info badge-manha">☀️ MANHÃ</span>';
          const modBadge = t.modalidade === 'online' ? '<span class="badge-info badge-online">🌐 ONLINE</span>' : '<span class="badge-info badge-presencial">🏢 PRESENCIAL</span>';

          return `
          <div class="team-card">
              <div class="card-header">
                  <span class="team-vertente">// ${t.vertente || 'SEM VERTENTE DEFINIDA'}</span>
                  <h3 class="team-name">${t.nomeEquipe.toUpperCase()}</h3>
                  <div style="margin-top: 8px;">${modBadge} ${turnoBadge}</div>
              </div>
              <div class="card-body">
                  ${btnRender}
                  ${badgeAprovacao}
                  <div class="nota-wrapper">
                      <span class="nota-label">NOTA TÉCNICA<br><small style="opacity: 0.5; font-size: 0.7rem;">(Escala de 0 a 10)</small></span>
                      <input type="number" id="input-${t.id}" class="note-input" placeholder="-" min="0" max="10" step="0.5" value="${notaSalva}">
                  </div>
              </div>
          </div>
      `}).join('');
  }

  window.confirmarEnvioGeral = async function() {
      let notasParaEnviar = [];
      
      // O sistema varre as equipas, mas o getElementById vai ignorar as que não estão na tela (filtradas)
      teams.forEach(t => {
          const inputDom = document.getElementById(`input-${t.id}`);
          if (inputDom && inputDom.value !== "") { 
              let notaFormatada = Math.min(10, Math.max(0, parseFloat(inputDom.value))); 
              notasParaEnviar.push({ id: t.id, nota: notaFormatada, nome: t.nomeEquipe }); 
          }
      });

      if (notasParaEnviar.length === 0) { window.toast("Preencha ao menos uma nota nas equipas visíveis antes de salvar!", "warning"); return; }
      if (confirm(`Atenção: Deseja oficializar as notas de ${notasParaEnviar.length} equipe(s) visível(is) agora?`)) { enviarTudo(notasParaEnviar); }
  };

  async function enviarTudo(lista) {
      const btn = document.getElementById('btn-submit-all'); btn.disabled = true; btn.innerHTML = "<span>⏳</span> PROCESSANDO...";
      try {
          const updates = {}; const avaliador = sessionStorage.getItem('inova_nome_cliente');
          lista.forEach(item => { updates[`equipes/${item.id}/notasEquipe/nota_cliente`] = item.nota; updates[`equipes/${item.id}/notasEquipe/avaliador_cliente`] = avaliador; });
          await window.InovaDB.update(window.InovaDB.ref(window.InovaDB.db), updates);
          window.toast("Notas salvas com sucesso!", "success");
          btn.innerHTML = "<span>✅</span> NOTAS SALVAS"; btn.style.background = "transparent"; btn.style.color = "var(--yellow)"; btn.style.border = "2px solid var(--yellow)";
          setTimeout(() => { btn.disabled = false; btn.innerHTML = "<span>✓</span> SALVAR NOTAS DA TELA"; btn.style.background = "var(--yellow)"; btn.style.color = "#000"; btn.style.border = "none"; }, 3000);
      } catch (e) { console.error(e); window.toast("Erro de conexão ao salvar as notas. Verifique a internet.", "error"); btn.disabled = false; btn.innerHTML = "<span>⚠️</span> TENTAR NOVAMENTE"; }
  }
</script>
</body>
</html>
