<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Avaliação Especialista | Inova+ 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;700&family=Space+Mono&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/base.css"/>
  <style>
    body { background: var(--dark); color: var(--text); font-family: 'Syne', sans-serif; padding: 20px; padding-bottom: 140px; }
    
    .header-especialista { text-align: center; margin-bottom: 30px; border-bottom: 1px solid var(--yellow); padding-bottom: 15px; }
    
    .container-grid { max-width: 1200px; margin: 0 auto; }

    .teams-grid { 
        display: grid; 
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); 
        gap: 15px; 
    }
    
    .team-card { 
        background: var(--panel); 
        border: 1px solid var(--border); 
        padding: 20px 15px; 
        border-radius: 12px; 
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        gap: 15px;
        text-align: center;
        transition: 0.3s;
    }
    .team-card:hover { border-color: var(--yellow); background: rgba(255,214,0,0.02); box-shadow: 0 0 15px rgba(255,214,0,0.1); }
    
    .team-card p { font-family: 'Space Mono', monospace; font-size: 0.65rem; color: var(--muted); margin: 0; text-transform: uppercase; letter-spacing: 1px;}
    .team-card h3 { font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; color: #fff; margin: 5px 0 0 0; letter-spacing: 1px; line-height: 1.1; }
    
    /* BOTÃO DO RENDER */
    .btn-render { display: block; padding: 10px; border-radius: 6px; font-family: 'Bebas Neue'; font-size: 1.1rem; letter-spacing: 1px; text-decoration: none; transition: 0.2s; }
    .btn-render.ready { background: var(--cyan); color: var(--dark); border: 1px solid var(--cyan); }
    .btn-render.ready:hover { background: #fff; transform: scale(1.05); }
    .btn-render.waiting { background: rgba(255,255,255,0.02); color: var(--muted); border: 1px dashed var(--muted); cursor: not-allowed; font-size: 0.9rem;}

    .note-input { 
        width: 100%; height: 60px; font-size: 2.2rem; text-align: center; 
        background: #000; border: 2px solid #333; color: var(--yellow); 
        font-family: 'Bebas Neue'; border-radius: 8px; outline: none; transition: 0.2s;
    }
    .note-input:focus { border-color: var(--yellow); box-shadow: 0 0 15px rgba(255,214,0,0.3); }

    /* RODAPÉ DE ENVIO */
    .footer-actions {
        position: fixed;
        bottom: 0; left: 0; right: 0;
        background: rgba(7, 9, 15, 0.98);
        padding: 25px;
        border-top: 1px solid var(--yellow);
        backdrop-filter: blur(10px);
        display: flex;
        justify-content: center;
        z-index: 100;
    }

    .btn-finalizar {
        background: var(--yellow); color: #000; border: none; padding: 18px 60px;
        font-family: 'Bebas Neue'; font-size: 1.6rem; letter-spacing: 2px;
        cursor: pointer; border-radius: 8px; box-shadow: 0 0 30px rgba(255,214,0, 0.2);
        transition: 0.3s;
    }
    .btn-finalizar:hover { transform: translateY(-3px); box-shadow: 0 0 40px rgba(255,214,0, 0.5); background: #fff; }

  </style>
</head>
<body>

<div class="header-especialista">
  <div style="font-family:'Space Mono'; font-size:0.6rem; color:var(--yellow); letter-spacing:2px; margin-bottom:5px;">PAINEL DE AVALIAÇÃO DE MERCADO</div>
  <h1 style="font-family:'Bebas Neue'; font-size:2.5rem; color:#fff; margin:0;">JURADO ESPECIALISTA</h1>
  <p id="client-name-display" style="color:var(--cyan); font-size:0.85rem; margin-top:5px; font-family: 'Space Mono', monospace;"></p>
  
  <button onclick="window.AUTH.logout()" style="position:absolute; top:20px; right:20px; background:transparent; border:1px solid var(--border); color:var(--muted); padding:5px 15px; border-radius:4px; font-family:'Space Mono'; font-size:0.7rem; cursor:pointer;">SAIR</button>
</div>

<div class="container-grid">
    <div class="teams-grid" id="teams-grid">
        <div style="text-align:center; color:var(--muted); font-family:'Space Mono'; grid-column: 1 / -1; padding: 50px;">
            Carregando Squads...
        </div>
    </div>
</div>

<div class="footer-actions">
    <button class="btn-finalizar" id="btn-submit-all" onclick="window.confirmarEnvioGeral()">
        🚀 SALVAR NOTAS TÉCNICAS
    </button>
</div>

<script type="module" src="../assets/js/app.js"></script>
<script>
  // 1. SEMÁFORO DE CARREGAMENTO SEGURO
  const checkLoad = setInterval(() => {
      if (window.AUTH && window.InovaDB) {
          clearInterval(checkLoad);
          iniciarCliente();
      }
  }, 100);

  let teams = [];
  
  function iniciarCliente() {
      // Barreira de segurança: Só entra quem logou como 'cliente'
      window.AUTH.require('cliente');

      let nome = sessionStorage.getItem('inova_nome_cliente');
      if (!nome) {
          nome = prompt("BEM-VINDO JURADO! Por favor, identifique-se (Nome e Empresa):");
          if (!nome || nome.trim().length < 2) { 
              window.AUTH.logout(); // Expulsa se cancelar o prompt
              return; 
          }
          sessionStorage.setItem('inova_nome_cliente', nome.trim());
      }
      document.getElementById('client-name-display').textContent = "AVALIADOR: " + nome.toUpperCase();
      
      carregarDados();
  }

  function carregarDados() {
      window.InovaDB.onValue(window.InovaDB.ref(window.InovaDB.db, 'equipes'), (snapshot) => {
          const data = snapshot.val();
          teams = data ? Object.keys(data).map(id => ({ id, ...data[id] })) : [];
          // Ordena alfabeticamente para ficar organizado
          teams.sort((a,b) => a.nomeEquipe.localeCompare(b.nomeEquipe));
          render();
      });
  }

  function render() {
      const grid = document.getElementById('teams-grid');
      
      if(teams.length === 0) {
          grid.innerHTML = `<div style="text-align:center; color:#ff4444; font-family:'Space Mono'; grid-column: 1 / -1; padding: 50px;">Nenhum Squad registrado no banco de dados.</div>`;
          return;
      }

      grid.innerHTML = teams.map(t => {
          const notaSalva = (t.notasEquipe && t.notasEquipe.nota_cliente) !== undefined ? t.notasEquipe.nota_cliente : "";
          
          // LÓGICA DO BOTÃO DE RENDER 3D
          let btnRender = '';
          if (t.renderEnviado && t.renderLink) {
              btnRender = `<a href="${t.renderLink}" target="_blank" class="btn-render ready">👁️ VER PROJETO 3D</a>`;
          } else {
              btnRender = `<div class="btn-render waiting">⏳ Aguardando Render</div>`;
          }

          return `
          <div class="team-card">
              <div>
                  <p>${t.vertente || 'SEM VERTENTE'}</p>
                  <h3>${t.nomeEquipe.toUpperCase()}</h3>
              </div>
              
              <div>
                  ${btnRender}
              </div>

              <div class="input-box">
                  <span style="font-family:'Space Mono'; font-size:0.65rem; color:var(--muted); display:block; margin-bottom:8px;">NOTA TÉCNICA (0-10)</span>
                  <input type="number" id="input-${t.id}" class="note-input" placeholder="-" min="0" max="10" step="0.5" value="${notaSalva}">
              </div>
          </div>
      `}).join('');
  }

  window.confirmarEnvioGeral = async function() {
      let notasParaEnviar = [];
      teams.forEach(t => {
          const val = document.getElementById(`input-${t.id}`).value;
          if (val !== "") {
              notasParaEnviar.push({ id: t.id, nota: parseFloat(val), nome: t.nomeEquipe });
          }
      });

      if (notasParaEnviar.length === 0) {
          window.toast("Preencha ao menos uma nota antes de salvar!", "warning");
          return;
      }

      if (confirm(`Deseja oficializar as notas de ${notasParaEnviar.length} equipe(s) agora?`)) {
          enviarTudo(notasParaEnviar);
      }
  };

  async function enviarTudo(lista) {
      const btn = document.getElementById('btn-submit-all');
      btn.disabled = true;
      btn.textContent = "PROCESSANDO...";
      try {
          const updates = {};
          const avaliador = sessionStorage.getItem('inova_nome_cliente');
          lista.forEach(item => {
              updates[`equipes/${item.id}/notasEquipe/nota_cliente`] = item.nota;
              updates[`equipes/${item.id}/notasEquipe/avaliador_cliente`] = avaliador;
          });
          
          await window.InovaDB.update(window.InovaDB.ref(window.InovaDB.db), updates);
          
          window.toast("Notas salvas com sucesso!", "success");
          btn.textContent = "✅ NOTAS SALVAS";
          btn.style.background = "transparent";
          btn.style.color = "var(--yellow)";
          btn.style.border = "2px solid var(--yellow)";
          
          setTimeout(() => {
              btn.disabled = false;
              btn.textContent = "🚀 SALVAR NOTAS TÉCNICAS";
              btn.style.background = "var(--yellow)";
              btn.style.color = "#000";
              btn.style.border = "none";
          }, 3000);

      } catch (e) {
          console.error(e);
          window.toast("Erro de conexão ao salvar as notas.", "error");
          btn.disabled = false;
          btn.textContent = "TENTAR NOVAMENTE";
      }
  }
</script>
</body>
</html>
